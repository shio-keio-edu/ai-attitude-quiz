:root{

*{margin:0;padding:0;box-sizing:border-box;}
body{

}
.app{

  display:flex;
  flex-direction:column;
  padding:0 16px 32px;
}
.topbar{
  display:flex;align-items:center;gap:10px;

}
.topbar .dot{width:10px;height:10px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
.topbar .name{font-family:'DotGothic16',monospace;font-size:15px;letter-spacing:.05em;}
.topbar .status{font-size:11px;color:var(--sub);margin-left:auto;}
.screen{display:none;flex:1;flex-direction:column;}
.screen.active{display:flex;}
.intro{justify-content:center;text-align:center;gap:20px;padding:40px 8px;}
.intro h1{
  font-family:'DotGothic16',monospace;
  font-size:clamp(30px,8vw,40px);
  line-height:1.35;
  letter-spacing:.04em;
}
.intro h1 .accent{color:var(--cyan);}
.intro .tagline{color:var(--sub);font-size:14px;line-height:1.9;}
.intro .tagline strong{color:var(--yellow);font-weight:700;}
.btn{
  font-family:inherit;
  border:none;cursor:pointer;
  background:var(--cyan);color:#0C1226;
  font-size:16px;font-weight:700;
  padding:16px 24px;border-radius:999px;
  transition:transform .12s ease, box-shadow .12s ease;

}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:translateY(1px);box-shadow:0 2px 0 rgba(0,0,0,.35);}
.btn:focus-visible{outline:3px solid var(--yellow);outline-offset:3px;}
.intro .note{font-size:11px;color:var(--sub);}
.chat{gap:14px;padding:20px 0;}
.progress{display:flex;gap:6px;justify-content:center;padding:4px 0 10px;}
.progress span{width:22px;height:5px;border-radius:3px;background:rgba(255,255,255,.12);transition:background .3s;}
.progress span.done{background:var(--cyan);}
.msg-ai{display:flex;gap:10px;align-items:flex-end;animation:pop .35s ease both;}
.avatar{
  width:36px;height:36px;border-radius:12px;flex-shrink:0;
  background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
  font-family:'DotGothic16',monospace;font-size:16px;color:var(--cyan);
  border:1px solid rgba(79,227,193,.35);
}
.bubble-ai{
  background:var(--bubble-ai);
  border-radius:var(--radius) var(--radius) var(--radius) 4px;
  padding:14px 16px;font-size:15px;line-height:1.75;
  max-width:85%;
}
.bubble-ai .qnum{
  font-family:'DotGothic16',monospace;
  font-size:11px;color:var(--cyan);display:block;margin-bottom:4px;letter-spacing:.1em;
}
.choices{display:flex;flex-direction:column;gap:10px;padding:6px 0 0 46px;animation:pop .35s .15s ease both;}
.choice{
  font-family:inherit;
  text-align:left;cursor:pointer;
  background:transparent;color:var(--ink);
  border:1.5px solid rgba(255,255,255,.22);
  border-radius:var(--radius) var(--radius) 4px var(--radius);
  padding:13px 16px;font-size:14px;line-height:1.6;
  transition:border-color .15s, background .15s, transform .1s;
}
.choice:hover{border-color:var(--cyan);background:rgba(79,227,193,.08);}
.choice:active{transform:scale(.98);}
.choice:focus-visible{outline:3px solid var(--yellow);outline-offset:2px;}
@keyframes pop{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.result{padding:24px 0;gap:18px;align-items:center;}
.card{
  width:100%;

  color:var(--paper-ink);

.meter .bar{height:10px;background:#E4E8F4;border-radius:5px;overflow:hidden;}
.meter .fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--cyan),#38B893);width:0;transition:width .9s cubic-bezier(.2,.8,.2,1);}
.meter .val{text-align:right;font-family:'DotGothic16',monospace;}

.ai-comment p{font-size:13px;line-height:1.8;}
.ai-comment .label{font-size:10px;font-weight:700;color:#38B893;display:block;margin-bottom:2px;letter-spacing:.1em;}
.card .hash{

.actions{display:flex;flex-direction:column;gap:10px;width:100%;}

.btn-ghost{background:transparent;color:var(--sub);border:1.5px solid rgba(255,255,255,.18);box-shadow:none;font-weight:500;font-size:14px;}
.copied{color:var(--cyan) !important;border-color:var(--cyan) !important;}
@media (prefers-reduced-motion: reduce){
  *{animation:none !important;transition:none !important;}
}
</style>

<div class="app">

      </div>

    </div>
    <div class="actions">
      <button class="btn btn-img" id="imgBtn" onclick="shareImage()">結果画像を保存・シェア</button>
      <button class="btn btn-x" onclick="shareX()">Xで結果をシェアする</button>

const TYPES = {

let idx = 0;
let scores = {keigo:0,teishu:0,izon:0,friend:0,shio:0,keikai:0};
let resultType = null;

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0});
}

function startQuiz(){
  idx = 0;
  scores = {keigo:0,teishu:0,izon:0,friend:0,shio:0,keikai:0};
  renderQuestion();
  show('quiz');
}

function renderQuestion(){
  const q = QUESTIONS[idx];
  document.getElementById('qnum').textContent = `Q${idx+1} / ${QUESTIONS.length}`;
  document.getElementById('qtext').textContent = q.q;
  const prog = document.getElementById('progress');
  prog.innerHTML = QUESTIONS.map((_,i)=>`<span class="${i<idx?'done':''}"></span>`).join('');
  const box = document.getElementById('choices');
  box.innerHTML = '';
  const shuffled = q.a.map((c)=>c).sort(()=>Math.random()-.5);
  shuffled.forEach((c)=>{
    const b = document.createElement('button');
    b.className = 'choice';
    b.textContent = c.t;
    b.onclick = ()=>answer(c.s);
    box.appendChild(b);
  });
  const msg = document.querySelector('.msg-ai');
  msg.style.animation='none'; void msg.offsetWidth; msg.style.animation='';
  box.style.animation='none'; void box.offsetWidth; box.style.animation='';
}

function answer(s){
  for(const k in s) scores[k] += s[k];
  idx++;
  if(idx < QUESTIONS.length){
    renderQuestion();
  }else{
    finish();
  }
}

function finish(){
  let best = 'shio', max = -1;
  for(const k in scores){
    if(scores[k] > max){ max = scores[k]; best = k; }
  }
  resultType = TYPES[best];
  document.getElementById('r-badge').textContent = resultType.badge;
  document.getElementById('r-name').textContent = resultType.name;
  document.getElementById('r-yomi').textContent = resultType.yomi;
  document.getElementById('r-desc').textContent = resultType.desc;
  document.getElementById('r-comment').textContent = resultType.comment;
  show('result');
  setTimeout(()=>{
    ['m1','m2','m3'].forEach((id,i)=>{
      document.getElementById(id).style.width = resultType.m[i] + '%';
      document.getElementById('v'+(i+1)).textContent = resultType.m[i];
    });
  }, 150);
}

// ===== シェア機能 =====
function shareText(){
  let t = `【AIへの接し方診断】\n私の結果：${resultType.name}（${resultType.badge}）\n\n礼儀 ${resultType.m[0]} / AI依存度 ${resultType.m[1]} / AI信頼度 ${resultType.m[2]}\n\n#AIへの接し方診断`;
  return t;
}

function shareX(){
  let url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText());
  if(SITE_URL) url += '&url=' + encodeURIComponent(SITE_URL);
  window.open(url, '_blank');
}

function copyResult(){
  const t = shareText() + (SITE_URL ? '\n' + SITE_URL : '');
  navigator.clipboard.writeText(t).then(()=>{
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'コピーしました！';
    btn.classList.add('copied');
    setTimeout(()=>{
      btn.textContent = '結果テキストをコピー';
      btn.classList.remove('copied');
    }, 1800);
  });
}

// ===== 結果画像生成（Canvas手描き・1200x675 X最適サイズ） =====
function wrapJa(ctx, text, maxWidth){
  const lines = [];
  let line = '';
  for(const ch of text){
    if(ctx.measureText(line + ch).width > maxWidth){
      lines.push(line);
      line = ch;
    }else{
      line += ch;
    }
  }
  if(line) lines.push(line);
  return lines;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

async function drawResultImage(){
  await document.fonts.ready;
  const W=1200,H=675;
  const cv = document.createElement('canvas');
  cv.width=W; cv.height=H;
  const ctx = cv.getContext('2d');
  const DOT = "'DotGothic16', monospace";
  const SANS = "'Zen Kaku Gothic New', sans-serif";

  // 背景
  ctx.fillStyle = '#141C33';
  ctx.fillRect(0,0,W,H);
  // 上部ストライプ
  for(let x=0; x<W; x+=28){
    ctx.fillStyle = (x/28)%2===0 ? '#4FE3C1' : '#FFD23F';
    ctx.fillRect(x,0,14,10);
    ctx.fillRect(x+14,0,14,10);
  }
  // カード
  const cx=70, cy=50, cw=W-140, chh=H-110;
  ctx.fillStyle = '#FAFBFF';
  roundRect(ctx,cx,cy,cw,chh,24);
  ctx.fill();

  // ラベル
  ctx.textAlign='center';
  ctx.fillStyle='#7A85A8';
  ctx.font = `20px ${DOT}`;
  ctx.fillText('A I   A T T I T U D E   R E P O R T', W/2, cy+50);

  // バッジ
  ctx.font = `bold 22px ${SANS}`;
  const badgeText = resultType.badge;
  const bw = ctx.measureText(badgeText).width + 50;
  ctx.fillStyle = '#1A2340';
  roundRect(ctx, W/2-bw/2, cy+72, bw, 42, 21);
  ctx.fill();
  ctx.fillStyle = '#FAFBFF';
  ctx.fillText(badgeText, W/2, cy+101);

  // タイプ名
  ctx.fillStyle = '#1A2340';
  ctx.font = `bold 72px ${SANS}`;
  ctx.fillText(resultType.name, W/2, cy+195);
  ctx.font = `18px ${DOT}`;
  ctx.fillStyle = '#7A85A8';
  ctx.fillText(resultType.yomi.split('').join(' '), W/2, cy+228);

  // メーター（左カラム）
  const mx = cx+60, my = cy+280;
  const labels = ['礼儀','AI依存度','AI信頼度'];
  ctx.textAlign='left';
  for(let i=0;i<3;i++){
    const y = my + i*58;
    ctx.fillStyle = '#1A2340';
    ctx.font = `bold 22px ${SANS}`;
    ctx.fillText(labels[i], mx, y+8);
    // バー
    const bx = mx+140, bwid = 280, bh = 18;
    ctx.fillStyle = '#E4E8F4';
    roundRect(ctx,bx,y-8,bwid,bh,9); ctx.fill();
    const grad = ctx.createLinearGradient(bx,0,bx+bwid,0);
    grad.addColorStop(0,'#4FE3C1'); grad.addColorStop(1,'#38B893');
    ctx.fillStyle = grad;
    roundRect(ctx,bx,y-8,bwid*resultType.m[i]/100,bh,9); ctx.fill();
    ctx.fillStyle = '#1A2340';
    ctx.font = `22px ${DOT}`;
    ctx.fillText(String(resultType.m[i]), bx+bwid+16, y+8);
  }

  // AIからのひとこと（右カラム）
  const ax = cx+cw/2+30, ay = cy+262, aw = cw/2-90;
  ctx.fillStyle = '#EEF6F3';
  roundRect(ctx,ax-20,ay-24,aw+40,190,18); ctx.fill();
  ctx.fillStyle = '#38B893';
  ctx.font = `bold 17px ${SANS}`;
  ctx.fillText('AI本人からのひとこと', ax, ay);
  ctx.fillStyle = '#1A2340';
  ctx.font = `19px ${SANS}`;
  const clines = wrapJa(ctx, resultType.comment, aw);
  clines.slice(0,5).forEach((l,i)=>{
    ctx.fillText(l, ax, ay+34+i*29);
  });

  // フッター（ハッシュタグ＋URL）
  ctx.textAlign='center';
  ctx.fillStyle='#7A85A8';
  ctx.font = `20px ${DOT}`;
  const footer = SITE_URL ? `#AIへの接し方診断  ${SITE_URL.replace(/^https?:\/\//,'')}` : '#AIへの接し方診断';
  ctx.fillText(footer, W/2, cy+chh-30);

  return cv;
}

async function shareImage(){
  const btn = document.getElementById('imgBtn');
  btn.textContent = '画像を生成中…';
  try{
    const cv = await drawResultImage();
    const blob = await new Promise(res=>cv.toBlob(res,'image/png'));
    const file = new File([blob], 'ai-attitude-result.png', {type:'image/png'});

    // モバイル：Web Share APIで直接シェア（Xアプリ等に渡せる）
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        files:[file],
        text: shareText() + (SITE_URL ? '\n' + SITE_URL : ''),
      });
    }else{
      // PC：ダウンロード
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'ai-attitude-result.png';
      a.click();
      URL.revokeObjectURL(a.href);
    }
  }catch(e){
    if(e.name !== 'AbortError') console.error(e);
  }
  btn.textContent = '結果画像を保存・シェア';
}

function restart(){
  show('intro');
}
